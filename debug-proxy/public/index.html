<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Debug Proxy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --border: #2d3148;
      --text: #e2e4f0;
      --muted: #6b7280;
      --accent: #5b6ff5;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
    }

    body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; font-size: 13px; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header h1 { font-size: 14px; font-weight: 600; color: var(--accent); white-space: nowrap; }
    .header-spacer { flex: 1; }
    .count { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .filter-input { flex: 1; max-width: 280px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--muted); }
    .btn { padding: 5px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .btn:hover { opacity: .8; }
    .btn-clear { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); flex-shrink: 0; }
    .dot.off { background: var(--muted); box-shadow: none; }

    /* Main layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Request list */
    .list-panel { width: 380px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .list-scroll { flex: 1; overflow-y: auto; }
    .list-scroll::-webkit-scrollbar { width: 4px; }
    .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .req-row { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; min-width: 0; }
    .req-row:hover { background: var(--bg2); }
    .req-row.selected { background: var(--bg3); border-left: 2px solid var(--accent); }
    .req-row.pending { opacity: .6; }

    .method-badge { font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; min-width: 36px; text-align: center; }
    .m-get { background: #1d3a6b; color: var(--blue); }
    .m-post { background: #1a3d2b; color: var(--green); }
    .m-put { background: #3d2a1a; color: var(--orange); }
    .m-delete { background: #3d1a1a; color: var(--red); }
    .m-other { background: var(--bg3); color: var(--muted); }

    .status-badge { font-size: 10px; font-weight: 700; min-width: 28px; flex-shrink: 0; }
    .s-2 { color: var(--green); }
    .s-3 { color: var(--blue); }
    .s-4 { color: var(--yellow); }
    .s-5 { color: var(--red); }
    .s-err { color: var(--red); }
    .s-pending { color: var(--muted); }

    .req-info { flex: 1; min-width: 0; }
    .req-host { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .req-path { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .req-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); line-height: 1.8; }
    .empty strong { color: var(--text); display: block; margin-bottom: 8px; }

    /* Detail panel */
    .detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .detail-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); flex-direction: column; gap: 8px; }
    .detail-placeholder span { font-size: 32px; }

    .detail-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .detail-url { padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); font-size: 12px; word-break: break-all; display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; }
    .detail-url .method-badge { margin-top: 1px; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
    .tab { padding: 8px 16px; cursor: pointer; color: var(--muted); font-size: 12px; border-bottom: 2px solid transparent; transition: all .15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .tab-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .tab-body::-webkit-scrollbar { width: 4px; }
    .tab-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section { margin-bottom: 16px; }
    .section-title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .kv-table { width: 100%; border-collapse: collapse; }
    .kv-table tr:hover td { background: var(--bg3); }
    .kv-table td { padding: 3px 6px; vertical-align: top; font-size: 12px; }
    .kv-table td:first-child { color: var(--muted); white-space: nowrap; padding-right: 12px; min-width: 160px; }
    .kv-table td:last-child { word-break: break-all; }

    .body-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; line-height: 1.5; }
    .body-block.json { color: #a8d8a8; }
    .body-block.empty-body { color: var(--muted); font-style: italic; }

    .status-line { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .status-code-big { font-size: 20px; font-weight: 700; }
    .duration-tag { font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<div class="header">
  <div class="dot off" id="dot" title="WebSocket 连接状态"></div>
  <h1>Mobile Debug Proxy</h1>
  <input class="filter-input" id="filter" placeholder="过滤 URL / host / 状态码..." oninput="applyFilter()">
  <div class="header-spacer"></div>
  <span class="count" id="count">0 条请求</span>
  <button class="btn btn-clear" onclick="clearAll()">清空</button>
</div>

<div class="main">
  <div class="list-panel">
    <div class="list-scroll" id="list">
      <div class="empty" id="empty">
        <span>📡</span>
        <strong>等待请求...</strong>
        手机设置代理后，访问任意网址即可在此看到请求
      </div>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-placeholder" id="detail-placeholder">
      <span>🔍</span>
      点击左侧请求查看详情
    </div>
    <div class="detail-content" id="detail-content" style="display:none">
      <div class="detail-url" id="detail-url"></div>
      <div class="tabs">
        <div class="tab active" onclick="showTab('req')">请求</div>
        <div class="tab" onclick="showTab('res')">响应</div>
      </div>
      <div class="tab-body" id="tab-req"></div>
      <div class="tab-body" id="tab-res" style="display:none"></div>
    </div>
  </div>
</div>

<script>
  let entries = [];
  let selectedId = null;
  let filterText = '';
  let activeTab = 'req';

  // ── WebSocket ──────────────────────────────────────────
  function connect() {
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onopen = () => document.getElementById('dot').classList.remove('off');
    ws.onclose = () => {
      document.getElementById('dot').classList.add('off');
      setTimeout(connect, 2000);
    };
    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);
      if (msg.type === 'init') {
        entries = msg.data;
        renderAll();
      } else if (msg.type === 'entry') {
        entries.push(msg.data);
        renderRow(msg.data, true);
        updateCount();
        if (selectedId === msg.data.id) renderDetail(msg.data);
      } else if (msg.type === 'update') {
        const idx = entries.findIndex(e => e.id === msg.data.id);
        if (idx >= 0) entries[idx] = msg.data;
        updateRow(msg.data);
        updateCount();
        if (selectedId === msg.data.id) renderDetail(msg.data);
      } else if (msg.type === 'clear') {
        entries = [];
        selectedId = null;
        renderAll();
        showPlaceholder();
      }
    };
  }

  // ── Rendering ──────────────────────────────────────────
  function methodClass(m) {
    return { GET: 'm-get', POST: 'm-post', PUT: 'm-put', DELETE: 'm-delete' }[m] || 'm-other';
  }

  function statusClass(s) {
    if (!s) return 's-pending';
    if (s === 0) return 's-err';
    if (s < 300) return 's-2';
    if (s < 400) return 's-3';
    if (s < 500) return 's-4';
    return 's-5';
  }

  function statusText(s) {
    if (s === null) return '···';
    if (s === 0) return 'ERR';
    return s;
  }

  function fmtDuration(ms) {
    if (!ms) return '';
    return ms >= 1000 ? `${(ms/1000).toFixed(1)}s` : `${ms}ms`;
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString('zh', { hour12: false });
  }

  function matches(e) {
    if (!filterText) return true;
    const q = filterText.toLowerCase();
    return (
      e.url.toLowerCase().includes(q) ||
      e.host.toLowerCase().includes(q) ||
      String(e.status || '').includes(q) ||
      (e.method || '').toLowerCase().includes(q)
    );
  }

  function renderAll() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    const visible = entries.filter(matches);
    if (visible.length === 0) {
      list.innerHTML = `<div class="empty"><span>📡</span><strong>等待请求...</strong>手机设置代理后，访问任意网址即可在此看到请求</div>`;
    } else {
      visible.forEach(e => renderRow(e, false));
    }
    updateCount();
  }

  function renderRow(e, append) {
    if (!matches(e)) return;
    const existing = document.getElementById(`row-${e.id}`);
    if (existing) { updateRow(e); return; }

    const el = document.createElement('div');
    el.className = `req-row${e.status === null ? ' pending' : ''}${selectedId === e.id ? ' selected' : ''}`;
    el.id = `row-${e.id}`;
    el.onclick = () => selectEntry(e.id);
    el.innerHTML = rowHTML(e);

    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    if (append) {
      list.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
      list.appendChild(el);
    }
  }

  function rowHTML(e) {
    return `
      <div class="method-badge ${methodClass(e.method)}">${e.method}</div>
      <div class="status-badge ${statusClass(e.status)}">${statusText(e.status)}</div>
      <div class="req-info">
        <div class="req-host">${esc(e.host)}</div>
        <div class="req-path">${esc(e.path)}</div>
      </div>
      <div class="req-time">${e.duration ? fmtDuration(e.duration) : fmtTime(e.time)}</div>
    `;
  }

  function updateRow(e) {
    const el = document.getElementById(`row-${e.id}`);
    if (!el) return;
    el.className = `req-row${e.status === null ? ' pending' : ''}${selectedId === e.id ? ' selected' : ''}`;
    el.innerHTML = rowHTML(e);
    el.onclick = () => selectEntry(e.id);
  }

  function updateCount() {
    const visible = entries.filter(matches).length;
    const total = entries.length;
    document.getElementById('count').textContent =
      filterText ? `${visible} / ${total} 条` : `${total} 条请求`;
  }

  function selectEntry(id) {
    const prev = document.getElementById(`row-${selectedId}`);
    if (prev) prev.classList.remove('selected');
    selectedId = id;
    const el = document.getElementById(`row-${id}`);
    if (el) el.classList.add('selected');
    const entry = entries.find(e => e.id === id);
    if (entry) renderDetail(entry);
  }

  function renderDetail(e) {
    document.getElementById('detail-placeholder').style.display = 'none';
    document.getElementById('detail-content').style.display = 'flex';

    document.getElementById('detail-url').innerHTML =
      `<div class="method-badge ${methodClass(e.method)}">${e.method}</div><span>${esc(e.url)}</span>`;

    renderReqTab(e);
    renderResTab(e);
  }

  function renderReqTab(e) {
    const el = document.getElementById('tab-req');
    el.innerHTML = `
      <div class="section">
        <div class="section-title">请求头</div>
        ${kvTable(e.reqHeaders)}
      </div>
      <div class="section">
        <div class="section-title">请求体</div>
        ${bodyBlock(e.reqBody)}
      </div>
    `;
  }

  function renderResTab(e) {
    const el = document.getElementById('tab-res');
    if (e.status === null) {
      el.innerHTML = `<div style="color:var(--muted);padding:20px">等待响应...</div>`;
      return;
    }
    el.innerHTML = `
      <div class="status-line">
        <span class="status-code-big ${statusClass(e.status)}">${e.status || 'ERR'}</span>
        ${e.duration ? `<span class="duration-tag">${fmtDuration(e.duration)}</span>` : ''}
      </div>
      <div class="section">
        <div class="section-title">响应头</div>
        ${kvTable(e.resHeaders)}
      </div>
      <div class="section">
        <div class="section-title">响应体</div>
        ${bodyBlock(e.resBody)}
      </div>
    `;
  }

  function kvTable(obj) {
    if (!obj || Object.keys(obj).length === 0) return '<span style="color:var(--muted);font-size:12px">（空）</span>';
    const rows = Object.entries(obj)
      .map(([k, v]) => `<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`)
      .join('');
    return `<table class="kv-table">${rows}</table>`;
  }

  function bodyBlock(text) {
    if (!text) return `<div class="body-block empty-body">（空）</div>`;
    let pretty = text;
    let cls = '';
    try {
      pretty = JSON.stringify(JSON.parse(text), null, 2);
      cls = ' json';
    } catch {}
    return `<div class="body-block${cls}">${esc(pretty)}</div>`;
  }

  function showPlaceholder() {
    document.getElementById('detail-placeholder').style.display = 'flex';
    document.getElementById('detail-content').style.display = 'none';
  }

  function showTab(name) {
    activeTab = name;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && name === 'req') || (i === 1 && name === 'res'));
    });
    document.getElementById('tab-req').style.display = name === 'req' ? '' : 'none';
    document.getElementById('tab-res').style.display = name === 'res' ? '' : 'none';
  }

  function applyFilter() {
    filterText = document.getElementById('filter').value.trim();
    renderAll();
  }

  function clearAll() {
    fetch('/api/clear', { method: 'POST' });
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  connect();
</script>
</body>
</html>
