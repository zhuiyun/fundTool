name: Build Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          mkdir -p signing
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > signing/release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION=$(grep versionName app/build.gradle.kts | grep -oP '"\K[^"]+')
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/fund-impact-v${VERSION}-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fund-impact-release
          path: app/build/outputs/apk/release/fund-impact-v*-release.apk
          retention-days: 30
